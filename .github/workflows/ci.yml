name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  UV_VERSION: 0.11.15
  UV_NO_SYNC: 1
  UV_LOCKED: 1
  PY_COLORS: 1

permissions:
  contents: read
jobs:
  app:
    if: github.repository == 'ghostty-org/discord-bot'
    runs-on: namespace-profile-ghostty-sm
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
      - name: Environment
        id: sync
        run: uv sync

      - name: taplo (TOML formatting)
        if: ${{ !cancelled() && steps.sync.conclusion == 'success' }}
        run: uv run taplo fmt --check --diff pyproject.toml packages/*/pyproject.toml config-example.toml
      - name: ruff format (Python formatting)
        if: ${{ !cancelled() && steps.sync.conclusion == 'success' }}
        run: uv run ruff format --diff
      - name: mdformat (Markdown formatting)
        if: ${{ !cancelled() && steps.sync.conclusion == 'success' }}
        run: uv run mdformat --number --wrap 80 --check *.md
      - name: ruff lint
        if: ${{ !cancelled() && steps.sync.conclusion == 'success' }}
        run: uv run ruff check --output-format github
      - name: basedpyright
        if: ${{ !cancelled() && steps.sync.conclusion == 'success' }}
        run: uv run basedpyright app tests
      - name: pytest
        if: ${{ !cancelled() && steps.sync.conclusion == 'success' }}
        run: uv run pytest -vv tests

  toolbox:
    if: github.repository == 'ghostty-org/discord-bot'
    runs-on: namespace-profile-ghostty-sm
    defaults:
      run:
        working-directory: ./packages/toolbox
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
      - name: Environment
        id: sync
        run: uv sync

      - name: basedpyright
        if: ${{ !cancelled() && steps.sync.conclusion == 'success' }}
        run: uv run basedpyright src tests
      - name: pytest
        if: ${{ !cancelled() && steps.sync.conclusion == 'success' }}
        run: uv run pytest -vv tests

  zizmor:
    name: Run zizmor
    if: github.repository == 'ghostty-org/discord-bot'
    runs-on: namespace-profile-ghostty-sm
    permissions:
      security-events: write # Required for upload-sarif (used by zizmor-action) to upload SARIF files.
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d  # v0.5.6
